<!DOCTYPE html>
<html>
<head>
    <title>Number Guessing Game</title>
</head>
<body>
    <h1>🎯 Number Guessing Game</h1>

    <p>{{ message }}</p>
    <p>Chances left: {{ chances }}</p>

    <form method="POST">
        <input type="number" name="guess" required>
        <button type="submit">Guess</button>
    </form>

</body>
</html>
